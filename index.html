<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Random Image</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    img {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      display: block;
    }
  </style>
</head>

<body>
  <img id="randomImage" />

  <audio id="bgMusic" autoplay loop>
    <source src="./audios/Rick Astley - Never Gonna Give You Up (Official Video) (4K Remaster).mp3" type="audio/mpeg">
  </audio>

  <script>
    const images = [
      "images/1.jpg",
      "images/2.jpg",
      //"images/3.jpg",
      //"images/4.jpg",
      "images/5.jpg",
      //"images/6.jpg",
      "images/7.jpg",
      "images/8.jpg",
      "images/9.jpg",
      "images/10.jpg",
      "images/11.jpg",
      "images/12.jpg",
      //"images/13.jpg",
      //"images/14.jpg",
      "images/15.jpg",
    ];

    const randomIndex = Math.floor(Math.random() * images.length);
    document.getElementById("randomImage").src = images[randomIndex];

    const audio = document.getElementById("bgMusic");
    audio.volume = 1.0;

    function startMusic() {
      audio.play().catch(() => {});
      document.removeEventListener("click", startMusic);
      document.removeEventListener("keydown", startMusic);
    }

    document.addEventListener("click", startMusic);
    document.addEventListener("keydown", startMusic);
  </script>
</body>
</html>
